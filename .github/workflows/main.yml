name: Supabase Keepalive

on:
  push:
    branches:
      - main
  schedule:
    # raz dziennie, wystarczy żeby Supabase się nie uśpił
    - cron: "0 3 * * *"   # 03:00 UTC
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST endpoint (wake-up only)
        run: |
          echo "Pinging Supabase..."

          curl --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/"

          echo "Supabase responded"
